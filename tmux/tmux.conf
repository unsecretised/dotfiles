unbind C-b
set -g prefix `
bind ` send-prefix

set -g base-index 1
set -g pane-base-index 1

# set -g status off

set -g default-terminal "${TERM}"
set -sg terminal-overrides ",*:RGB"

set -g status-style bg=default
set -g status-left ""
set -g status-right ""

set -g renumber-windows on

set -g mouse on
 
# Stupid line cursor thingy
set -g update-environment "...,CURSOR"
set -g escape-time 0
set -as terminal-overrides ',*:Ss=\E[%p1%d q:Se=\E[2 q'

bind -Tcopy-mode-vi y send -X copy-selection

# ~/.tmux.conf

# ============================================================================
# General Settings
# ============================================================================

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 10000
set -g escape-time 10
set -g focus-events on
set -g mouse on
# set -g status-keys vi
# set -g mode-keys vi

# ============================================================================
# Kanagawa Colour Palette
# ============================================================================
# Background shades
# sumiInk0    #16161D
# sumiInk1    #1F1F28
# sumiInk3    #363646
# sumiInk4    #54546D
# Foreground
# fujiWhite   #DCD7BA
# fujiGray    #727169
# Accent colours
# samuraiRed  #E82424
# roninYellow #FF9E3B
# dragonBlue  #658594
# crystalBlue #7E9CD8
# springBlue  #7FB4CA
# waveAqua    #6A9589
# springGreen #98BB6C
# boatYellow  #C0A36E
# oniViolet   #957FB8
# sakuraPink  #D27E99

# ============================================================================
# Status Line
# ============================================================================

set -g status on
set -g status-position bottom
set -g status-interval 5
set -g status-style 'bg=#1F1F28,fg=#DCD7BA'

# Left side - session name
# set -g status-left-length 600
set -g status-left-style 'bg=#1F1F28,fg=#DCD7BA'
set -g status-left '#[bg=#7E9CD8,fg=#1F1F28,bold]   #S #[bg=#1F1F28,fg=#7E9CD8]#[default] '

# Right side - date and time
# set -g status-right-length 100
set -g status-right-style 'bg=#1F1F28,fg=#DCD7BA'
set -g status-right '#[fg=#54546D] #[fg=#727169]%d %b #[fg=#54546D]│#[fg=#7E9CD8] %H:%M #[bg=#7E9CD8,fg=#1F1F28,bold]'

# ============================================================================
# Window Status
# ============================================================================

set -g window-status-separator ' || '
set -g window-status-style 'bg=#1F1F28,fg=#727169'
set -g window-status-format ' #[fg=#54546D]#I#[fg=#727169] #W '

set -g window-status-current-style 'bg=#1F1F28,fg=#7E9CD8'
set -g window-status-current-format '#[fg=#1F1F28,bg=#1F1F28]#[bg=#363646,fg=#7E9CD8,bold] #I #[fg=#DCD7BA]#W #[bg=#1F1F28,fg=#363646]'

set -g window-status-activity-style 'bg=#1F1F28,fg=#FF9E3B'
set -g window-status-bell-style 'bg=#1F1F28,fg=#E82424,bold'
bind -Tcopy-mode-vi MouseDragEnd1Pane send -X copy-selection-no-clear
